name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Initialize Browser library
        run: rfbrowser init

      - name: Run tests
        env:
          GLOP_EMAIL: ${{ secrets.GLOP_EMAIL }}
          GLOP_PASSWORD: ${{ secrets.GLOP_PASSWORD }}
        run: robot --pythonpath . --outputdir results tests/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/
